name: CMake

on:
  - push
  - pull_request

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
        - os: macos-latest
          cmake: cmake
        - os: ubuntu-latest
          cmake: cmake
        - os: windows-latest
          cmake: .\.github\workflows\build-windows.bat cmake

    steps:
    - name: clone opentrack/opentrack
      uses: actions/checkout@v2
      with:
        submodules: true

    - name: clone opentrack/depends
      uses: actions/checkout@v2
      with:
        repository: opentrack/opentrack-depends
        submodules: true
        path: opentrack-depends

    - uses: seanmiddleditch/gha-setup-ninja@master

    - name: Install Linux Dependencies
      run: |
        sudo apt update
        sudo apt install libproc2-dev libopencv-dev libopencv-dev wine64-tools
        sudo apt install qt6-tools-dev qt6-serialport-dev qt6-base-private-dev
        sudo apt install libusb-1.0-0-dev libsdl2-dev

        mkdir /tmp/a
        wget -qO- https://github.com/microsoft/onnxruntime/releases/download/v1.23.2/onnxruntime-linux-x64-1.23.2.tgz  | tar --strip-components=1 -zxf - -C/tmp/a
        sudo cp -R /tmp/a/{lib,include} /usr
      if: matrix.os == 'ubuntu-latest'

    - name: Install opencv (Windows)
      uses: cvpkg/opencv-action@main
      with:
        opencv_tag: '4.x'
        BUILD_LIST: 'core,imgcodecs,imgproc,video,videoio,calib3d,highgui'
        BUILD_SHARED_LIBS: 'OFF'
        BUILD_WITH_STATIC_CRT: 'OFF'
      if: matrix.os == 'windows-latest'

    - name: Install ONNXRuntime (Windows)
      run: |
        $version = "1.23.2"
        $url = "https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-x64-$version.zip"
        Invoke-WebRequest -Uri $url -OutFile onnxruntime.zip
        Expand-Archive onnxruntime.zip -DestinationPath $env:GITHUB_WORKSPACE
        echo "ONNXRUNTIME_DIR=$env:GITHUB_WORKSPACE/onnxruntime-win-x64-$version" >> $env:GITHUB_ENV
      if: matrix.os == 'windows-latest'

    # Optional Windows SDKs - Uncomment to enable specific trackers/outputs:
    # 
    # - name: Install SteamVR SDK (for VR headset tracking)
    #   run: |
    #     Invoke-WebRequest -Uri "https://github.com/ValveSoftware/openvr/archive/refs/tags/v2.5.1.zip" -OutFile steamvr.zip
    #     Expand-Archive steamvr.zip -DestinationPath $env:GITHUB_WORKSPACE
    #     echo "SDK_VALVE_STEAMVR=$env:GITHUB_WORKSPACE/openvr-2.5.1" >> $env:GITHUB_ENV
    #   if: matrix.os == 'windows-latest'
    #
    # - name: Install Eyeware Beam SDK (eye tracking)
    #   run: |
    #     # Download from https://beam.eyeware.tech/developers/
    #     # Extract and set SDK_EYEWARE_BEAM environment variable
    #   if: matrix.os == 'windows-latest'
    #
    # - name: Install Kinect v2 SDK (face tracking)
    #   run: |
    #     # Download Kinect SDK 2.0 from Microsoft
    #     # choco install kinectsdk2 (if available)
    #     # Set SDK_KINECT20 environment variable
    #   if: matrix.os == 'windows-latest'
    #
    # - name: Install Intel RealSense SDK (camera tracking)
    #   run: |
    #     # Download from https://github.com/IntelRealSense/librealsense/releases
    #     # Set SDK_REALSENSE environment variable
    #   if: matrix.os == 'windows-latest'
    #
    # - name: Install vJoy (virtual joystick output)
    #   run: |
    #     choco install vjoy
    #     # Set SDK_VJOYSTICK environment variable
    #   if: matrix.os == 'windows-latest'
    #
    # - name: Install Oculus SDK (Rift support)
    #   run: |
    #     # Download from https://developer.oculus.com/downloads/
    #     # Extract and set SDK_RIFT_140 environment variable
    #   if: matrix.os == 'windows-latest'

    - name: Install opencv (macOS)
      run: brew install opencv
      if: matrix.os == 'macos-latest'

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        dir: "${{ github.workspace }}/qt"
        version: '6.8.3'
        modules: qtserialport qtmultimedia qtimageformats
        target: 'desktop'
        use-official: true
      if: matrix.os != 'ubuntu-latest'

    - name: Configure
      run: ${{matrix.cmake}} -GNinja -S ${{github.workspace}}/ -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DQt6_DIR="${{env.QT_ROOT_DIR}}/lib/cmake/Qt6" -DONNXRuntime_DIR=${{ matrix.os == 'ubuntu-latest' && '/usr/lib/cmake/onnxruntime' || env.ONNXRUNTIME_DIR }}

    - name: Build
      run: ${{matrix.cmake}} --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target install

    - name: Upload build
      uses: actions/upload-artifact@v3
      with:
        name: buildoutput-${{ matrix.os }}
        path: ${{github.workspace}}/build/install/
